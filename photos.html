<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRI SUMANGALA NATIONAL SCHOOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap');

        body { 
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #020617 0%, #071430 40%, #0b2559 100%);
            background-attachment: fixed;
            color: #f8fafc; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Liquid Glass Header */
        header { 
            background: rgba(2, 6, 23, 0.5); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white; 
            padding: 25px 40px; 
            border-bottom: 2px solid rgba(255, 204, 0, 0.4); 
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .header-text { text-align: center; flex: 1; }
        header h1 { margin: 0; font-size: 2.6rem; font-weight: 700; letter-spacing: 2px; }
        header p { margin: 6px 0 0 0; color: #FFCC00; font-size: 1.1rem; font-weight: 500; }
        
        .header-logo { width: 95px; height: 95px; object-fit: contain; }
        
        /* Navigation Bar */
        nav { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(10px);
            padding: 16px; 
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        nav a { 
            color: #cbd5e1; 
            text-decoration: none; 
            margin: 0 8px; 
            font-weight: 600; 
            font-size: 0.95rem; 
            padding: 10px 22px;
            border-radius: 30px; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }
        nav a:hover, nav a.active { 
            color: #FFCC00; 
            background: rgba(255, 204, 0, 0.15);
            border-color: rgba(255, 204, 0, 0.6);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.35);
            transform: translateY(-3px); 
        }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        h2 { color: #FFCC00; font-size: 1.8rem; font-weight: 700; border-bottom: 2px solid rgba(255, 204, 0, 0.3); padding-bottom: 10px; margin-top: 0; }
        
        /* [Photo Grid System] */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        /* [Liquid Glass Photo Card] */
        .photo-card {
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.13);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 12px;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 204, 0, 0.4);
            box-shadow: 0 25px 45px rgba(0, 51, 102, 0.35);
        }
        
        /* Photo Frame */
        .photo-wrapper {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .photo-wrapper img { 
            width: 100%; 
            display: block; 
            height: 200px; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .photo-card:hover .photo-wrapper img {
            transform: scale(1.05); 
        }
        
        /* Card Text Style */
        .photo-info { padding: 12px 5px 5px 5px; }
        .photo-info h3 { margin: 0 0 6px 0; color: #FFCC00; font-size: 1.15rem; font-weight: 600; }
        .photo-info p { margin: 0; color: #cbd5e1; font-size: 0.88rem; line-height: 1.5; }
        
        footer { 
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(10px);
            color: #94a3b8; 
            text-align: center; 
            padding: 25px; 
            border-top: 2px solid rgba(255, 204, 0, 0.3); 
            margin-top: 60px; 
        }

        /* [ලොකුවන ෆොටෝ Popup Modal ස්ටයිල්] */
        .custom-image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(2, 6, 23, 0.9); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .custom-image-modal.show { opacity: 1; }
        
        .modal-expanded-image {
            max-width: 75%;
            max-height: 75%;
            border-radius: 16px;
            border: 2px solid rgba(255, 204, 0, 0.5); 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            transform: scale(0.85);
            transition: transform 0.3s ease, opacity 0.2s ease;
        }
        .custom-image-modal.show .modal-expanded-image { transform: scale(1); }
        
        .modal-close-button {
            position: absolute;
            top: 25px; right: 35px;
            color: #f8fafc;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 2100;
        }
        .modal-close-button:hover { color: #FFCC00; }
        
        #modalImageCaption {
            position: absolute;
            bottom: 40px;
            color: #FFCC00;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            text-align: center;
            width: 100%;
        }

        .modal-nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #f8fafc;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            user-select: none;
            z-index: 2100;
        }
        .modal-nav-button:hover {
            color: #FFCC00;
            background: rgba(255, 204, 0, 0.2);
            border-color: #FFCC00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }
        .prev-button { left: 40px; }
        .next-button { right: 40px; }

        @media (max-width: 768px) {
            .prev-button { left: 15px; }
            .next-button { right: 15px; }
            .modal-nav-button { font-size: 24px; padding: 8px 14px; }
            .modal-expanded-image { max-width: 85%; }
        }
    </style>
</head>

    <script>
        /* [භාවිතා කරන ආකාරය]:
          - cover: පිටත ගැලරියේ කාඩ් එකට පෙනෙන ප්‍රධාන ෆොටෝ එක.
          - title: ඇල්බමයේ මාතෘකාව.
          - desc: ඇල්බමය ගැන කෙටි විස්තරය.
          - albumPhotos: 🆕 මේ ඇල්බමයට විතරක් අයිති ෆොටෝස් වල නම් (ලැයිස්තුවක් ලෙස).
        */
        const myAlbums = [
            { 
                cover: "me1.jpeg", 
                title: "දෙරණ මාධ්‍ය වැඩමුළුව ", 
                desc: "Tv දෙරණ මාධ්‍ය ජාලයේ මූලිකත්වයෙන් වලපනේ සහ හඟුරන්කෙත පාසල් කලාප විසින් එක්ව සංවිධානය කල 'දෙරණ මාධ්‍ය වැඩමුළුව ' 2025/11/12 දින හඟුරන්කෙත සංස්කෘතික මධ්‍යස්ථානයේදී පසුගියදා පැවැත්විය.",
                albumPhotos: ["me1.jpeg","me2.jpeg","me3.jpeg","me4.jpeg","me5.jpeg","me6.jpeg","me7.jpeg","me8.jpeg","me9.jpeg","me10.jpeg","me11.jpeg","me12.jpeg","me13.jpeg","me14.jpeg","me15.jpeg","me16.jpeg","me17.jpeg","me18.jpeg","me19.jpeg","me20.jpeg","me21.jpeg","me22.jpeg","me23.jpeg",] // 👈 Sports Meet එකේ ෆොටෝස් විතරක් මෙතනට දාන්න!
            },
            { 
                cover: "wesak1.jpg", 
                title: "වෙසක් සතිය", 
                desc: "වෙසක් සතිය නිමිත්තෙන් 2026-05-29 දින 6-7 ශ්‍රේණිවල සිසුන් උදෙසා පැවැත්වූ ධර්ම දේශනා  වැඩසටහන.",
                albumPhotos: ["wesak1.jpg", "wesak2.jpg", "wesak3.jpg","wesak4.jpg","wesak5.jpg","wesak6.jpg","wesak7.jpg","wesak8.jpg","wesak9.jpg","wesak10.jpg","wesak11.jpg","wesak12.jpg","wesak13.jpg","wesak14.jpg","wesak15.jpg","wesak16.jpg","wesak17.jpg","wesak18.jpg","wesak19.jpg","wesak20.jpg","wesak21.jpeg","wesak22.jpeg","wesak23.jpeg",] // 👈 Workshop එකේ ෆොටෝස් විතරක් මෙතනට දාන්න!
            },
            { 
                cover: "prefert1.jpeg", 
                title: "සුමගුල් නවක කනිෂ්ඨ ශිෂ්‍ය නායක මණ්ඩල", 
                desc: "සුමගුල් නවක කනිෂ්ඨ ශිෂ්‍ය නායක මණ්ඩලයේ  දූ දරුවන් වෙනුවෙන් නවමු අත්දැකීමක් ලබාදීම පිණිස පුංචි ලෝකාන්තය කේන්ද්‍ර කරගනිමින්  සංවිධානය කරන ලද බැහැරගත නායකත්ව පුහුණු වැඩසටහන-2026.05.20-",
                albumPhotos: ["prefert1.jpeg","prefert2.jpeg","prefert3.jpeg","prefert4.jpeg","prefert5.jpeg","prefert6.jpeg","prefert7.jpeg","prefert8.jpeg","prefert9.jpeg","prefert10.jpeg","prefert11.jpeg","prefert12.jpeg","prefert13.jpeg","prefert14.jpeg","prefert15.jpeg","prefert16.jpeg","prefert17.jpeg","prefert18.jpeg","prefert19.jpeg","prefert20.jpeg","prefert21.jpeg","prefert22.jpeg","prefert23.jpeg","prefert24.jpeg","prefert25.jpeg","prefert26.jpeg","prefert27.jpeg","prefert28.jpeg",]
            },
            { 
                cover: "te1.jpeg", 
                title: "මධ්‍යම පළාත් ටයිකොන්ඩෝ සමස්ථ බාලක ශූරතාව සුමගුල් මාතාවට", 
                desc: "මධ්‍යම පළාත් පාසල් ක්‍රීඩා 2026 | 2026.05.22 දිගන ගෘහස්ථ ක්‍රීඩාංගනයේදී පැවති මධ්‍යම පළාත් ටයිකොන්ඩෝ  තරගාවලියේදී .රන් පදක්කම් - 06 රිදී පදක්කම් - 04 ලෝකඩ පදක්කම් - 03 සමගින් මුලු ලකුණු 45 ලබාගනිමින් සමස්ථ බාලක ශූරතාවය ලබාගත් සුමගුල් මාතාව රනින් බැබළවූ ශිෂ්‍යයන් හට උණුසුම්  සුභ පැතුම්!!",
                albumPhotos: ["te1.jpeg", "te2.jpeg","te3.jpeg","te4.jpeg","te5.jpeg","te6.jpeg","te7.jpeg","te8.jpeg","te9.jpeg","te10.jpeg","te11.jpeg",] 
            }
        ];

        // දැනට විවෘතව පවතින ඇල්බමය සහ එහි ඇති ෆොටෝ එකේ අංකය මතක තබා ගැනීමට විචල්‍යයන්
        let currentAlbumIndex = 0;
        let currentPhotoIndex = 0;

        // ලැයිස්තුව කියවා HTML Album Slots සාදන ක්‍රියාවලිය
        const galleryContainer = document.getElementById('photo-gallery-container');
        
        myAlbums.forEach((album, index) => {
            const cardHTML = `
                <div class="photo-card">
                    <div class="photo-wrapper">
                        <img src="images/${album.cover}" alt="${album.title}" onclick="openAlbum(${index})" style="cursor: pointer;">
                    </div>
                    <div class="photo-info">
                        <h3>${album.title}</h3>
                        <p>${album.desc}</p>
                    </div>
                </div>
            `;
            galleryContainer.innerHTML += cardHTML;
        });

        // ඇල්බමයක් විවෘත කිරීම
        function openAlbum(albumIndex) {
            currentAlbumIndex = albumIndex;
            currentPhotoIndex = 0; // සැමවිටම ඇල්බමයේ පළමු ෆොටෝ එකෙන් පටන් ගනී
            
            const modal = document.getElementById('imagePopupModal');
            modal.style.display = "flex";
            setTimeout(() => { modal.classList.add('show'); }, 10);
            
            updateModalImage();
        }

        function closeModal() {
            const modal = document.getElementById('imagePopupModal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = "none"; }, 300);
        }

        // ඇල්බමය ඇතුළේ ඊළඟ ෆොටෝ එකට යාම
        function nextImage(event) {
            event.stopPropagation();
            const activeAlbum = myAlbums[currentAlbumIndex];
            currentPhotoIndex = (currentPhotoIndex + 1) % activeAlbum.albumPhotos.length; // ඒ ඇල්බමයේ ප්‍රමාණයට පමණක් සීමා වේ
            updateModalImage();
        }

        // ඇල්බමය ඇතුළේ කලින් ෆොටෝ එකට යාම
        function prevImage(event) {
            event.stopPropagation();
            const activeAlbum = myAlbums[currentAlbumIndex];
            currentPhotoIndex = (currentPhotoIndex - 1 + activeAlbum.albumPhotos.length) % activeAlbum.albumPhotos.length;
            updateModalImage();
        }

        // පොප්-අප් එක ඇතුලේ පින්තූරය සහ මාතෘකාව (පින්තූර අංකය සමඟ) යාවත්කාලීන කිරීම
        function updateModalImage() {
            const modalImg = document.getElementById('expandedImage');
            const captionText = document.getElementById('modalImageCaption');
            const activeAlbum = myAlbums[currentAlbumIndex];
            
            modalImg.style.opacity = 0;
            setTimeout(() => {
                modalImg.src = "images/" + activeAlbum.albumPhotos[currentPhotoIndex];
                // උදාහරණ මාතෘකාව: "Sports Meet 2026 (Photo 1 of 4)"
                captionText.innerHTML = `${activeAlbum.title} <span style="color: #cbd5e1; font-size: 0.9rem; font-weight: normal;"><br>Photo ${currentPhotoIndex + 1} of ${activeAlbum.albumPhotos.length}</span>`;
                modalImg.style.opacity = 1;
            }, 100);
        }

        // කීබෝඩ් එකෙන් පාලනය කිරීමට හැකි කිරීම
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imagePopupModal');
            if (modal.style.display === "flex") {
                if (event.key === "ArrowRight") {
                    nextImage(event);
                } else if (event.key === "ArrowLeft") {
                    prevImage(event);
                } else if (event.key === "Escape") {
                    closeModal();
                }
            }
        });
    </script>

</body>
</html>
