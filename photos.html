<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Unit - SRI SUMANGALA NATIONAL SCHOOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap');

        body { 
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #020617 0%, #071430 40%, #0b2559 100%);
            background-attachment: fixed;
            color: #f8fafc; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Liquid Glass Header */
        header { 
            background: rgba(2, 6, 23, 0.5); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white; 
            padding: 25px 40px; 
            border-bottom: 2px solid rgba(255, 204, 0, 0.4); 
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .header-text { text-align: center; flex: 1; }
        header h1 { margin: 0; font-size: 2.6rem; font-weight: 700; letter-spacing: 2px; }
        header p { margin: 6px 0 0 0; color: #FFCC00; font-size: 1.1rem; font-weight: 500; }
        
        .header-logo { width: 95px; height: 95px; object-fit: contain; }
        
        /* Navigation Bar */
        nav { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(10px);
            padding: 16px; 
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        nav a { 
            color: #cbd5e1; 
            text-decoration: none; 
            margin: 0 8px; 
            font-weight: 600; 
            font-size: 0.95rem; 
            padding: 10px 22px;
            border-radius: 30px; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }
        nav a:hover, nav a.active { 
            color: #FFCC00; 
            background: rgba(255, 204, 0, 0.15);
            border-color: rgba(255, 204, 0, 0.6);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.35);
            transform: translateY(-3px); 
        }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        h2 { color: #FFCC00; font-size: 1.8rem; font-weight: 700; border-bottom: 2px solid rgba(255, 204, 0, 0.3); padding-bottom: 10px; margin-top: 0; }
        
        /* [Photo Grid System] */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        /* [Liquid Glass Photo Card] */
        .photo-card {
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.13);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 12px;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 204, 0, 0.4);
            box-shadow: 0 25px 45px rgba(0, 51, 102, 0.35);
        }
        
        /* Photo Frame */
        .photo-wrapper {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .photo-wrapper img { 
            width: 100%; 
            display: block; 
            height: 200px; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .photo-card:hover .photo-wrapper img {
            transform: scale(1.05); 
        }
        
        /* Card Text Style */
        .photo-info { padding: 12px 5px 5px 5px; }
        .photo-info h3 { margin: 0 0 6px 0; color: #FFCC00; font-size: 1.15rem; font-weight: 600; }
        .photo-info p { margin: 0; color: #cbd5e1; font-size: 0.88rem; line-height: 1.5; }
        
        footer { 
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(10px);
            color: #94a3b8; 
            text-align: center; 
            padding: 25px; 
            border-top: 2px solid rgba(255, 204, 0, 0.3); 
            margin-top: 60px; 
        }

        /* [លොකුවන ෆොටෝ Popup Modal ස්ටයිල්] */
        .custom-image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(2, 6, 23, 0.9); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .custom-image-modal.show { opacity: 1; }
        
        .modal-expanded-image {
            max-width: 75%;
            max-height: 75%;
            border-radius: 16px;
            border: 2px solid rgba(255, 204, 0, 0.5); 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            transform: scale(0.85);
            transition: transform 0.3s ease, opacity 0.2s ease;
        }
        .custom-image-modal.show .modal-expanded-image { transform: scale(1); }
        
        .modal-close-button {
            position: absolute;
            top: 25px; right: 35px;
            color: #f8fafc;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 2100;
        }
        .modal-close-button:hover { color: #FFCC00; }
        
        #modalImageCaption {
            position: absolute;
            bottom: 40px;
            color: #FFCC00;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            text-align: center;
            width: 100%;
        }

        /* 🆕➕ [අලුතෙන් එකතු කල CSS: වමට/දකුණට යන බටන් වල ස්ටයිල්] */
        .modal-nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #f8fafc;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            user-select: none;
            z-index: 2100;
        }
        .modal-nav-button:hover {
            color: #FFCC00;
            background: rgba(255, 204, 0, 0.2);
            border-color: #FFCC00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }
        .prev-button { left: 40px; }
        .next-button { right: 40px; }

        /* මොබයිල් ෆෝන් වලට බටන් පොඩි කිරීම */
        @media (max-width: 768px) {
            .prev-button { left: 15px; }
            .next-button { right: 15px; }
            .modal-nav-button { font-size: 24px; padding: 8px 14px; }
            .modal-expanded-image { max-width: 85%; }
        }
    </style>
</head>
<body>

    <header>
        <img src="images/school-logo.jpg" alt="School Logo" class="header-logo">
        <div class="header-text">
            <h1>MEDIA UNIT</h1>
            <p>SRI SUMANGALA NATIONAL SCHOOL</p>
        </div>
        <img src="images/media-logo.jpg" alt="Media Unit Logo" class="header-logo">
    </header>

    <nav>
 <a href="index.html">HOME</a>
        <a href="photos.html" class="active">PHOTOS</a>
        <a href="videos.html">VIDEOS</a>
        <a href="about.html">ABOUT</a>
        <a href="live.html">LIVE</a>
    </nav>

    <div class="container">
        <h2>Media Unit Image Gallery</h2>
        
        <div class="photo-grid" id="photo-gallery-container"></div>
    </div>

    <footer>
        <p>&copy; 2026 Media Unit Website. Infinite Liquid Glass Image Engine.</p>
    </footer>

    <div id="imagePopupModal" class="custom-image-modal" onclick="closeModal()">
        <span class="modal-close-button" onclick="closeModal()">&times;</span>
        
        <span class="modal-nav-button prev-button" onclick="prevImage(event)">&#10094;</span>
        
        <img class="modal-expanded-image" id="expandedImage" onclick="event.stopPropagation()">
        <div id="modalImageCaption" onclick="event.stopPropagation()"></div>
        
        <span class="modal-nav-button next-button" onclick="nextImage(event)">&#10095;</span>
    </div>

    <script>
        const myImages = [
            { file: "main-photo.jpg", title: "Sports Meet 2026", desc: "නිවාසාන්තර ක්‍රීඩා උත්සවයේ සමූහ ඡායාරූපය." },
            { file: "gallery1.jpg", title: "Media Workshop", desc: "නවක සාමාජිකයින් දැනුවත් කිරීමේ වැඩමුළුව." },
            { file: "gallery2.jpg", title: "Announcing Panel", desc: "නිවේදන කටයුතු මෙහෙයවූ නිවේදක මණ්ඩලය." },
            { file: "gallery3.jpg", title: "Photography Team", desc: "උත්සවය කැමරාකරණයෙන් හැඩකල අපේ කණ්ඩායම." }
        ];

        // දැනට විවෘතව පවතින ෆොටෝ එකේ අංකය (Index) මතක තබා ගැනීමට
        let currentImageIndex = 0;

        // ලැයිස්තුව කියවා HTML slots සාදන ක්‍රියාවලිය
        const galleryContainer = document.getElementById('photo-gallery-container');
        
        myImages.forEach((img, index) => {
            const cardHTML = `
                <div class="photo-card">
                    <div class="photo-wrapper">
                        <img src="images/${img.file}" alt="${img.title}" onclick="openModal(${index})" style="cursor: pointer;">
                    </div>
                    <div class="photo-info">
                        <h3>${img.title}</h3>
                        <p>${img.desc}</p>
                    </div>
                </div>
            `;
            galleryContainer.innerHTML += cardHTML;
        });

        // 🆕 [යාවත්කාලීන කල JavaScript Functions: ඇල්බම් එකක් මෙන් ක්‍රියා කිරීම]
        function openModal(index) {
            currentImageIndex = index;
            const modal = document.getElementById('imagePopupModal');
            modal.style.display = "flex";
            setTimeout(() => { modal.classList.add('show'); }, 10);
            updateModalImage();
        }

        function closeModal() {
            const modal = document.getElementById('imagePopupModal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = "none"; }, 300);
        }

        // ඊළඟ ෆොටෝ එකට යාම
        function nextImage(event) {
            event.stopPropagation(); // බැක්ග්‍රවුන්ඩ් එක ක්ලික් වීම වැළැක්වීමට
            currentImageIndex = (currentImageIndex + 1) % myImages.length; // අවසන් ෆොටෝ එකෙන් පසු නැවත මුලට යාමට
            updateModalImage();
        }

        // කලින් ෆොටෝ එකට යාම
        function prevImage(event) {
            event.stopPropagation();
            currentImageIndex = (currentImageIndex - 1 + myImages.length) % myImages.length;
            updateModalImage();
        }

        // පොප්-අප් එක ඇතුලේ පින්තූරය සහ මාතෘකාව අලුත් කිරීම
        function updateModalImage() {
            const modalImg = document.getElementById('expandedImage');
            const captionText = document.getElementById('modalImageCaption');
            
            modalImg.style.opacity = 0; // මාරු වන විට පොඩි ඇනිමේෂන් එකක් දීමට
            setTimeout(() => {
                modalImg.src = "images/" + myImages[currentImageIndex].file;
                captionText.innerHTML = myImages[currentImageIndex].title;
                modalImg.style.opacity = 1;
            }, 100);
        }

        // කීබෝඩ් එකේ වම/දකුණ ඊතල (Arrow Keys) වලින්ද ෆොටෝ මාරු කිරීමට හැකි කිරීම
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imagePopupModal');
            if (modal.style.display === "flex") {
                if (event.key === "ArrowRight") {
                    nextImage(event);
                } else if (event.key === "ArrowLeft") {
                    prevImage(event);
                } else if (event.key === "Escape") {
                    closeModal();
                }
            }
        });
    </script>

</body>
</html>
